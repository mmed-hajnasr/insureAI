services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: assure_ai_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    container_name: assure_ai_backend
    build:
      context: ./assure_ai
      dockerfile: Dockerfile
      target: prod
    environment:
      AGENTS_HOST: 0.0.0.0
      AGENTS_PORT: 8001
      AGENTS_RELOAD: "false"
      AGENTS_QDRANT_URL: http://qdrant:6333
      AGENTS_QDRANT_COLLECTION_PREFIX: assurance
      AGENTS_QDRANT_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      AGENTS_GOOGLE_API_KEY: ${AGENTS_GOOGLE_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8001"

  frontend:
    container_name: insurai_frontend
    build:
      context: ./insurai
      dockerfile: Dockerfile
      args:
        VITE_ASSURE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  qdrant_data: