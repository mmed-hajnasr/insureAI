[global]
type=global
endpoint_identifier_order=username,ip

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[agent]
type=endpoint
context=from-linphone
disallow=all
allow=ulaw
auth=agent-auth
aors=agent
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=no
set_var=RECORD_MIN_DURATION=1

[agent]
type=aor
max_contacts=5
remove_existing=yes

[agent-auth]
type=auth
auth_type=userpass
username=agent
password=1234
