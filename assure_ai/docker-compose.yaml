services:
  postgres:
    image: postgres:18.1-bookworm
    container_name: postgres_insta_dash
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # for the init_db.sh script
      DATABASE__USERNAME: ${DATABASE__USERNAME}
      DATABASE__PASSWORD: ${DATABASE__PASSWORD}
    ports:
      - "${DATABASE__PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    command: postgres -N 1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 1s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"
    networks:
      - insta_dash_network

  redis:
    image: redis:8.4.0
    container_name: redis_insta_dash
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 50
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"
    networks:
      - insta_dash_network

  jaeger:
    container_name: jaeger_insta_dash
    image: jaegertracing/jaeger:${JAEGER_VERSION:-2.10.0}
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP gRPC receiver
      - "4317:4317"
      # OTLP HTTP receiver
      - "4318:4318"
      # Jaeger Thrift compact (used by some clients)
      - "6831:6831/udp"
      # Jaeger Thrift binary (used by some clients)
      - "6832:6832/udp"
      # Health check
      - "14269:14269"
    environment:
      - LOG_LEVEL=${JAEGER_LOG_LEVEL:-info}
      - COLLECTOR_OTLP_ENABLED=true
      # Enable OTLP gRPC receiver
      - COLLECTOR_OTLP_GRPC_HOST_PORT=:4317
      # Enable OTLP HTTP receiver
      - COLLECTOR_OTLP_HTTP_HOST_PORT=:4318
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"
    networks:
      - insta_dash_network

volumes:
  postgres_data:
    name: assure_ai_postgres_data

networks:
  insta_dash_network:
    name: insta_dash_network
    driver: bridge
